global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'edge-sync'
    static_configs:
      - targets: ['edge-sync:9100']
    metrics_path: '/metrics'

  - job_name: 'cloud-ingress'
    static_configs:
      - targets: ['ingress:9101']
    metrics_path: '/metrics'

  - job_name: 'nats'
    static_configs:
      - targets: ['nats:8222']
    metrics_path: '/metrics'
