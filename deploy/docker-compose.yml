# Full factory telemetry stack: MQTT → edge → NATS → gRPC → Kafka → TimescaleDB.
# Run from repo root: `docker compose -f deploy/docker-compose.yml up -d --build`

services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"

  kafka:
    image: apache/kafka:3.7.0
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 5s
      timeout: 15s
      retries: 20
      start_period: 25s

  kafka-init:
    image: apache/kafka:3.7.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists \
          --bootstrap-server kafka:29092 \
          --topic detcp.telemetry.batches \
          --partitions 3 \
          --replication-factor 1
        echo "Kafka topic ready."

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: detcp
      POSTGRES_PASSWORD: detcp_dev_change_me
      POSTGRES_DB: detcp
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U detcp -d detcp"]
      interval: 3s
      timeout: 5s
      retries: 15

  ingress:
    build:
      context: ..
      dockerfile: cloud-plane/Dockerfile
    command: ["ingress"]
    ports:
      - "50051:50051"
    environment:
      KAFKA_BROKERS: kafka:29092
      GRPC_LISTEN: ":50051"
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  processor:
    build:
      context: ..
      dockerfile: cloud-plane/Dockerfile
    command: ["processor"]
    environment:
      KAFKA_BROKERS: kafka:29092
      DATABASE_URL: postgres://detcp:detcp_dev_change_me@timescaledb:5432/detcp?sslmode=disable
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      timescaledb:
        condition: service_healthy

  edge-gateway:
    build:
      context: ..
      dockerfile: edge/Dockerfile
    command: ["edge-gateway"]
    environment:
      MQTT_URL: mqtt://mosquitto:1883
      NATS_URL: nats://nats:4222
      EDGE_NODE_ID: edge-01
    depends_on:
      - mosquitto
      - nats

  edge-sync:
    build:
      context: ..
      dockerfile: edge/Dockerfile
    command: ["edge-sync"]
    environment:
      NATS_URL: nats://nats:4222
      INGRESS_ADDR: http://ingress:50051
      EDGE_NODE_ID: edge-01
    depends_on:
      edge-gateway:
        condition: service_started
      nats:
        condition: service_started
      ingress:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
